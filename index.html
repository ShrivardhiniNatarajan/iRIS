<!DOCTYPE html>
<html>
<head>
    <title>Audio Transcriber</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="box">

        <h1>🎧 IRIS - Audio Transcriber & Summarizer</h1>
        <p class="subtext">
            Upload an audio file -> Get transcription -> Generate summary
        </p>

        <h3>Upload Audio File</h3>
        <input type="file" id="audioFile">

        <button onclick="transcribeAudio()">Transcribe Audio</button>

        <h3>Transcription Output</h3>
        <textarea id="transcription" placeholder="Transcribed text will appear here..."></textarea>

        <button class="green" onclick="summarizeText()">Summarize Text</button>

        <h3>Summary Output</h3>
        <textarea id="summary" placeholder="Summary will appear here..."></textarea>

    </div>

    <script src="scripts.js"></script>

</body>
</html>
